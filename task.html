<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Website Task</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#f3e8ff,#e9d5ff);
    padding:20px;
    text-align:center;
}

/* Navbar - Mobile First */
nav{
    display:flex;
    flex-direction:column;
    background:#ffffff;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

nav a{
    text-decoration:none;
    color:#333;
    padding:10px;
    font-weight:bold;
    transition:0.3s;
}

nav a:hover{
    color:blue;
}

/* Desktop Navbar */
@media(min-width:768px){
    nav{
        flex-direction:row;
        justify-content:center;
        gap:40px;
    }
}

h1{
    margin:25px 0;
    color:#222;
}

/* Image */
img{
    width:350px;
    max-width:100%;
    border-radius:20px; /* Odd Roll Number */
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    transition:0.4s;
}

img:hover{
    transform:scale(1.05);
}

/* Video */
video{
    width:50vw;
    background:blue; /* Roll No ends with 1 */
    padding:15px;
    border-radius:10px;
    margin-top:20px;
}

/* Table */
table{
    margin:30px auto;
    border-collapse:collapse;
}

th, td{
    border:1px solid #000;
    padding:12px;
}

th{
    background:#ddd;
}

/* Button */
button{
    border:none;
    background:blue; /* Roll No ends with 1 */
    color:white;
    padding:12px 25px;
    margin:20px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
    font-size:16px;
}

button:hover{
    background:darkblue;
    transform:scale(1.1);
}

#count{
    font-size:18px;
    font-weight:bold;
    margin-bottom:20px;
}

/* Grid Desktop First */
.grid-container{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-top:30px;
}

.box{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
    transition:0.3s;
    font-size:22px;
    font-weight:bold;
}

.box:hover{
    transform:translateY(-8px);
    background:#dcecff;
}

/* Mobile Grid */
@media(max-width:767px){
    .grid-container{
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<!-- Heading -->
<h1>Responsive Website Project</h1>

<!-- Image -->
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800"
alt="Nature Image">

<br><br>

<!-- Video -->
<video controls>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    Your browser does not support video.
</video>

<!-- Table -->
<table>
    <tr>
        <th>1</th>
        <th>2</th>
        <th>3</th>
    </tr>
    <tr>
        <td>HTML</td>
        <td>CSS</td>
        <td>JavaScript</td>
    </tr>
    <tr>
        <td>Responsive</td>
        <td>Interactive</td>
        <td>Modern</td>
    </tr>
</table>

<!-- Button -->
<button onclick="increaseCount()">Click Me</button>

<p id="count">Button Clicks: 0</p>

<!-- Grid -->
<div class="grid-container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
    <div class="box">7</div>
    <div class="box">8</div>
</div>

<script>
let count = 0;

function increaseCount(){
    count++;
    document.getElementById("count").innerText =
    "Button Clicks: " + count;
}
</script>

</body>
</html>
